name: Publish to GitHub Packages

# Publishes @codelittinc/carbon-design-system to GitHub Packages.
#
# Fires on every push to main: bump the version in package.json (see CLAUDE.md)
# and the merge publishes it. Also runs on published Releases and manual
# dispatch. If the current package.json version is already on the registry the
# publish step is skipped (not failed), so a merge that forgot to bump is a
# no-op rather than a red pipeline.
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@codelittinc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check whether this version is already published
        id: check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Package version: $VERSION"
          if npm view "@codelittinc/carbon-design-system@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already published — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # `prepack` (pnpm run build:lib) runs automatically and produces dist/.
      - name: Publish
        if: steps.check.outputs.publish == 'true'
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
