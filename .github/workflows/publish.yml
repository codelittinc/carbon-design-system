name: Publish to GitHub Packages

# Publishes @codelittinc/carbon-design-system to GitHub Packages and cuts a
# matching GitHub Release.
#
# Fires on every push to main: bump the version in package.json and add a
# CHANGELOG entry (see CLAUDE.md); the merge then publishes that version and
# creates a `v<version>` release with those notes. If the current version is
# already on the registry, both steps are skipped (not failed), so a merge that
# forgot to bump is a no-op rather than a red pipeline.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the git tag + GitHub Release
      packages: write # publish to GitHub Packages
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json's `packageManager` field; do not also set
      # `version` here or action-setup errors on the duplicate.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@codelittinc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check whether this version is already published
        id: check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Package version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@codelittinc/carbon-design-system@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already published — skipping publish + release."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # `prepack` (pnpm run build:lib) runs automatically and produces dist/.
      - name: Publish
        if: steps.check.outputs.publish == 'true'
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          # Pull the notes for this version out of CHANGELOG.md: everything
          # between "## [VERSION]" and the next "## " heading.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md)

          TAG="v$VERSION"
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "No CHANGELOG entry for $VERSION — falling back to auto-generated notes."
            gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" --generate-notes
          else
            printf '%s\n' "$NOTES" > /tmp/release-notes.md
            gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" --notes-file /tmp/release-notes.md
          fi
